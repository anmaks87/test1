<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#1058;&#1077;&#1089;&#1090;</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    }

    .card {
      width: min(420px, calc(100vw - 32px));
      text-align: center;
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      color: #ffffff;
      background: #0078d4;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: #005ea6;
    }

    #telegram-button {
      background: #229ed9;
    }

    #telegram-button:hover {
      background: #1678a9;
    }

    #telegram-button:disabled {
      background: #7ab9d9;
      cursor: wait;
    }

    #telegram-test-button {
      background: #0f766e;
    }

    #telegram-test-button:hover {
      background: #0b5c56;
    }

    #telegram-test-button:disabled {
      background: #6fb4ae;
      cursor: wait;
    }

    #danya-button {
      background: #f28b30;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      font-size: 24px;
      font-weight: 700;
      border-radius: 18px;
    }

    #danya-button:hover {
      background: #cc6d16;
    }

    .button-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.7);
      flex-shrink: 0;
    }

    .recipients {
      margin: 0 auto 18px;
      padding: 14px 16px;
      background: #f7f9fc;
      border-radius: 14px;
      text-align: left;
    }

    .recipients-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #334155;
    }

    .recipient-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: #1f2937;
      font-size: 15px;
    }

    .recipient-item:last-child {
      margin-bottom: 0;
    }

    .recipient-item input {
      width: 18px;
      height: 18px;
    }

    #message {
      margin-top: 18px;
      font-size: 22px;
      color: #222222;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="recipients">
      <p class="recipients-title">Обери отримувачів</p>
      <label class="recipient-item">
        <input type="checkbox" name="recipient" value="user1">
        <span>Користувач 1</span>
      </label>
      <label class="recipient-item">
        <input type="checkbox" name="recipient" value="user2">
        <span>Користувач 2</span>
      </label>
      <label class="recipient-item">
        <input type="checkbox" name="recipient" value="user3">
        <span>Користувач 3</span>
      </label>
    </div>

    <div class="buttons">
      <button id="test-button" type="button">&#1058;&#1077;&#1089;&#1090;</button>
      <button id="telegram-button" type="button">&#1054;&#1090;&#1087;&#1088;&#1072;&#1074;&#1080;&#1090;&#1100;</button>
      <button id="telegram-test-button" type="button">
        &#1054;&#1090;&#1087;&#1088;&#1072;&#1074;&#1080;&#1090;&#1100; &#1058;&#1045;&#1057;&#1058;
      </button>
      <button id="danya-button" type="button">
        <img
          class="button-photo"
          src="danya-photo.jpg"
          alt="&#1060;&#1086;&#1090;&#1086; &#1044;&#1072;&#1085;&#1110;"
        >
        <span>&#1044;&#1072;&#1085;&#1103;</span>
      </button>
    </div>
    <div id="message"></div>
  </div>

  <script>
    const testButton = document.getElementById("test-button");
    const telegramButton = document.getElementById("telegram-button");
    const telegramTestButton = document.getElementById("telegram-test-button");
    const danyaButton = document.getElementById("danya-button");
    const message = document.getElementById("message");
    const recipientInputs = document.querySelectorAll('input[name="recipient"]');
    const workerUrl = "https://telegram-sender.a-n-maksimenko.workers.dev/";
    const testRecipient = "user1";
    const telegramText = "\u041f\u0440\u0438\u0432\u0435\u0442";
    const danyaText =
      "\u0421\u0438\u043d\u043e\u0447\u043e\u043a, \u0434\u043e\u0431\u0440\u0438\u0439 \u0440\u0430\u043d\u043e\u043a. \u0429\u043e \u0441\u043f\u0430\u043b\u043e\u0441\u044c \u0442\u0430 \u044f\u043a \u0441\u043d\u0438\u043b\u043e\u0441\u044c?";

    async function sendTelegramMessage(recipients, triggerButton) {
      triggerButton.disabled = true;
      message.textContent = "\u0412\u0456\u0434\u043f\u0440\u0430\u0432\u043b\u044f\u044e...";

      try {
        const response = await fetch(workerUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: telegramText,
            recipients
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || "Request failed");
        }

        message.textContent = "\u041f\u043e\u0432\u0456\u0434\u043e\u043c\u043b\u0435\u043d\u043d\u044f \u0432\u0456\u0434\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043e";
      } catch (error) {
        message.textContent =
          "\u041f\u043e\u043c\u0438\u043b\u043a\u0430: " + error.message;
      } finally {
        triggerButton.disabled = false;
      }
    }

    testButton.addEventListener("click", () => {
      message.textContent = "\u041f\u0440\u0438\u0432\u0435\u0442";
    });

    telegramButton.addEventListener("click", async () => {
      const recipients = Array.from(recipientInputs)
        .filter((input) => input.checked)
        .map((input) => input.value);

      if (recipients.length === 0) {
        message.textContent =
          "\u041e\u0431\u0435\u0440\u0438 \u0445\u043e\u0447\u0430 \u0431 \u043e\u0434\u043d\u043e\u0433\u043e \u043e\u0442\u0440\u0438\u043c\u0443\u0432\u0430\u0447\u0430";
        return;
      }

      await sendTelegramMessage(recipients, telegramButton);
    });

    telegramTestButton.addEventListener("click", async () => {
      await sendTelegramMessage([testRecipient], telegramTestButton);
    });

    danyaButton.addEventListener("click", () => {
      message.textContent = danyaText;
    });
  </script>
</body>
</html>
