<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#1058;&#1077;&#1089;&#1090;</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    }

    .card {
      width: min(420px, calc(100vw - 32px));
      text-align: center;
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      color: #ffffff;
      background: #0078d4;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: #005ea6;
    }

    #telegram-button {
      background: #229ed9;
    }

    #telegram-button:hover {
      background: #1678a9;
    }

    #danya-button {
      background: #f28b30;
    }

    #danya-button:hover {
      background: #cc6d16;
    }

    #message {
      margin-top: 18px;
      font-size: 22px;
      color: #222222;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="buttons">
      <button id="test-button" type="button">&#1058;&#1077;&#1089;&#1090;</button>
      <button id="telegram-button" type="button">&#1054;&#1090;&#1087;&#1088;&#1072;&#1074;&#1080;&#1090;&#1100;</button>
      <button id="danya-button" type="button">&#1044;&#1072;&#1085;&#1103;</button>
    </div>
    <div id="message"></div>
  </div>

  <script>
    const testButton = document.getElementById("test-button");
    const telegramButton = document.getElementById("telegram-button");
    const danyaButton = document.getElementById("danya-button");
    const message = document.getElementById("message");
    const danyaText =
      "\u0421\u043e\u043d\u043e\u0447\u043e\u043a, \u0434\u043e\u0431\u0440\u0438\u0439 \u0440\u0430\u043d\u043e\u043a. \u0429\u043e \u0441\u043f\u0430\u043b\u043e\u0441\u044c \u0442\u0430 \u044f\u043a \u0441\u043d\u0438\u043b\u043e\u0441\u044c?";

    testButton.addEventListener("click", () => {
      message.textContent = "\u041f\u0440\u0438\u0432\u0435\u0442";
    });

    telegramButton.addEventListener("click", () => {
      message.textContent = "\u041f\u0440\u0438\u0432\u0435\u0442";
    });

    danyaButton.addEventListener("click", () => {
      message.textContent = danyaText;
    });
  </script>
</body>
</html>
