<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    }

    .card {
      text-align: center;
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      color: #ffffff;
      background: #0078d4;
    }

    button:hover {
      background: #005ea6;
    }

    #message {
      margin-top: 18px;
      font-size: 22px;
      color: #222222;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <button id="test-button" type="button">Тест</button>
    <div id="message"></div>
  </div>

  <script>
    const button = document.getElementById("test-button");
    const message = document.getElementById("message");

    button.addEventListener("click", () => {
      message.textContent = "Привет";
    });
  </script>
</body>
</html>
